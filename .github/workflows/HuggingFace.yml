name: Download HF Model and Upload Artifact

on:
  workflow_dispatch: # 支持手动触发并输入模型 ID
    inputs:
      model_id:
        description: 'Hugging Face 模型 ID (例如: bert-base-uncased)'
        required: true
        default: 'bert-base-uncased'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Model using new HF CLI
      # 如果模型需要权限，请在 GitHub 仓库的 Secrets 中配置 HF_TOKEN
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: |
        # 创建目标文件夹
        mkdir -p ./my-model
        
        # 使用最新的 hf download 命令，指定本地保存目录
        # 注：hf 默认直接下载实体文件，无需像以前那样关闭软链接参数
        hf download ${{ github.event.inputs.model_id }} --local-dir ./my-model

    - name: Zip Model Folder (Optional but Recommended)
      # 打包成 zip 可以显著加快 GitHub Artifact 的上传和下载速度
      run: |
        zip -r model.zip ./my-model

    - name: Upload Model to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.model_id }}-artifact
        path: model.zip
        retention-days: 5 # 设置产物保留天数
