name: Download HF Model and Upload Artifact

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: 'Hugging Face 模型 ID'
        required: true
        default: 'bert-base-uncased'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 核心：安装并动态添加 $PATH
    - name: Install and Configure Path
      run: |
        pip install -U huggingface_hub
        PYTHON_BIN_DIR=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
        echo "$PYTHON_BIN_DIR" >> $GITHUB_PATH

    # 核心：在下一步使用 hf
    - name: Download Model
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }} 
      run: |
        mkdir -p ./my-model
        hf download ${{ github.event.inputs.model_id }} --local-dir ./my-model

    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: model-artifact
        path: ./my-model
